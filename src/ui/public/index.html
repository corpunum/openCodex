<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>openCodex - Autonomous Coding Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; height: 100vh; background: #0f0f0f; color: #e0e0e0; }
    
    /* Sidebar */
    #sidebar { width: 260px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; }
    #new-chat-btn { margin: 12px; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
    #new-chat-btn:hover { background: #1d4ed8; }
    #sessions-list { flex: 1; overflow-y: auto; }
    .session-item { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid #2a2a2a; }
    .session-item:hover { background: #252525; }
    .session-item.active { background: #2563eb20; border-left: 3px solid #2563eb; }
    .session-title { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-meta { font-size: 11px; color: #888; margin-top: 4px; }
    
    /* Main */
    #main { flex: 1; display: flex; flex-direction: column; }
    #chat-panel { flex: 1; overflow-y: auto; padding: 20px; }
    .message { max-width: 800px; margin: 0 auto 16px; padding: 12px 16px; border-radius: 8px; }
    .message.user { background: #2563eb20; border: 1px solid #2563eb40; }
    .message.assistant { background: #1a1a1a; border: 1px solid #333; }
    .message-content { white-space: pre-wrap; line-height: 1.5; }
    
    /* Input */
    #input-area { padding: 16px 20px; background: #1a1a1a; border-top: 1px solid #333; }
    #input-container { max-width: 800px; margin: 0 auto; display: flex; gap: 12px; }
    #message-input { flex: 1; padding: 12px 16px; background: #0f0f0f; border: 1px solid #333; border-radius: 6px; color: #e0e0e0; font-size: 14px; }
    #message-input:focus { outline: none; border-color: #2563eb; }
    #send-btn { padding: 12px 24px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
    #send-btn:hover { background: #1d4ed8; }
    #send-btn:disabled { background: #444; cursor: not-allowed; }
    
    /* Loading */
    .loading { color: #888; font-style: italic; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
  </style>
</head>
<body>
  <div id="sidebar">
    <button id="new-chat-btn">+ New Chat</button>
    <div id="sessions-list"></div>
  </div>
  
  <div id="main">
    <div id="chat-panel"></div>
    <div id="input-area">
      <div id="input-container">
        <input type="text" id="message-input" placeholder="Ask openCodex to code something..." autocomplete="off">
        <button id="send-btn">Send</button>
      </div>
    </div>
  </div>

  <script>
    let currentSession = null;
    let ws = null;
    
    // Connect WebSocket
    function connectWS() {
      ws = new WebSocket(`ws://127.0.0.1:18882/ws`);
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'response') {
          appendMessage('assistant', msg.response);
          document.getElementById('send-btn').disabled = false;
        }
      };
      ws.onclose = () => setTimeout(connectWS, 2000);
    }
    connectWS();
    
    // Load sessions
    async function loadSessions() {
      const res = await fetch('/api/sessions');
      const data = await res.json();
      const list = document.getElementById('sessions-list');
      list.innerHTML = data.sessions.map(s => `
        <div class="session-item" data-id="${s.id}">
          <div class="session-title">${escapeHtml(s.title)}</div>
          <div class="session-meta">${s.messageCount} messages</div>
        </div>
      `).join('');
      
      list.querySelectorAll('.session-item').forEach(el => {
        el.addEventListener('click', () => selectSession(el.dataset.id));
      });
    }
    
    // Select session
    async function selectSession(id) {
      currentSession = id;
      document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
      document.querySelector(`[data-id="${id}"]`)?.classList.add('active');
      
      const res = await fetch(`/api/sessions/${id}`);
      const data = await res.json();
      const panel = document.getElementById('chat-panel');
      panel.innerHTML = data.session.messages.map(m => `
        <div class="message ${m.role}">
          <div class="message-content">${escapeHtml(m.content)}</div>
        </div>
      `).join('');
      panel.scrollTop = panel.scrollHeight;
    }
    
    // New chat
    document.getElementById('new-chat-btn').addEventListener('click', async () => {
      const res = await fetch('/api/sessions', { method: 'POST' });
      const data = await res.json();
      currentSession = data.session.id;
      document.getElementById('chat-panel').innerHTML = '';
      loadSessions();
      selectSession(currentSession);
    });
    
    // Send message
    async function sendMessage() {
      const input = document.getElementById('message-input');
      const message = input.value.trim();
      if (!message) return;
      
      input.value = '';
      document.getElementById('send-btn').disabled = true;
      appendMessage('user', message);
      
      ws.send(JSON.stringify({ type: 'chat', message, sessionId: currentSession }));
    }
    
    function appendMessage(role, content) {
      const panel = document.getElementById('chat-panel');
      panel.innerHTML += `
        <div class="message ${role}">
          <div class="message-content">${escapeHtml(content)}</div>
        </div>
      `;
      panel.scrollTop = panel.scrollHeight;
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    document.getElementById('send-btn').addEventListener('click', sendMessage);
    document.getElementById('message-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
    
    // Initial load
    loadSessions();
  </script>
</body>
</html>
